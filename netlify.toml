
[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Proxy para o Firebase Auth funcionar no domínio da Netlify (Habilita o nome bonito no login)
[[redirects]]
  from = "/__/auth/*"
  to = "https://studio-9995869127-3ea67.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true
